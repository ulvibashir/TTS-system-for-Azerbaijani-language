services:
  # ─── 1. Python Flask API (rule-based TTS pipeline) ───────────────────────
  - type: web
    name: az-tts-api
    runtime: python
    rootDir: 02_Technical/base-native-app/api
    buildCommand: >
      sudo apt-get update -y &&
      sudo apt-get install -y espeak-ng espeak-ng-data &&
      pip install flask
    startCommand: python api_server.py
    plan: free
    envVars:
      - key: PORT
        value: 10000

  # ─── 2. Next.js web app ──────────────────────────────────────────────────
  - type: web
    name: az-tts-native
    runtime: node
    rootDir: 02_Technical/base-native-app
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: FLASK_API_URL
        sync: false   # Set this manually in Render dashboard after API is deployed
      - key: PORT
        value: 3000
