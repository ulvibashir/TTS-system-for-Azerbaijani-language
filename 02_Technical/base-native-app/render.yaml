services:
  # ─── 1. Python Flask API (rule-based TTS pipeline) ───────────────────────
  - type: web
    name: az-tts-api
    runtime: docker
    rootDir: 02_Technical/base-native-app
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 10000

  # ─── 2. Next.js web app ──────────────────────────────────────────────────
  - type: web
    name: az-tts-native
    runtime: node
    rootDir: 02_Technical/base-native-app
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: FLASK_API_URL
        sync: false
      - key: PORT
        value: 3000
